<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Masjid Al-Hamzah</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #1B5E20; --bg: #F8F9FA; }
        body { font-family: sans-serif; margin: 0; background: var(--bg); overflow-x: hidden; }
        
        /* Auth Overlay - Fix for Clickability */
        #authOverlay { 
            position: fixed; inset: 0; background: white; z-index: 10000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }

        .page { display: none; padding: 20px 20px 100px 20px; }
        .active-page { display: block !important; }

        /* Navigation Fix */
        .bottom-nav { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: white; display: flex; justify-content: space-around; 
            padding: 15px 0; border-top: 1px solid #eee; z-index: 999; 
        }
        .nav-item { color: #999; text-align: center; cursor: pointer; flex: 1; }
        .nav-item.active { color: var(--primary); font-weight: bold; }
        .nav-item i { display: block; font-size: 1.2rem; }

        /* UI Cards */
        .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .btn { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; }
        
        #chatList { height: 300px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; margin-bottom: 10px; }
        .msg { padding: 10px; border-radius: 10px; max-width: 80%; font-size: 0.9rem; }
        .msg-me { align-self: flex-end; background: var(--primary); color: white; }
        .msg-them { align-self: flex-start; background: #eee; }
    </style>
</head>
<body>

    <div id="authOverlay">
        <h2>Masjid Al-Hamzah</h2>
        <button class="btn" id="loginBtn" style="width: auto; padding: 10px 20px;">
            Sign in with Google
        </button>
    </div>

    <div id="home" class="page active-page">
        <div class="card" style="background: var(--primary); color: white; text-align: center;">
            <p>Next Prayer</p>
            <h1>Maghrib</h1>
            <h2>7:04 PM</h2>
        </div>
        <div class="card">
            <h3>Bank Details</h3>
            <p>Acc: 0173040100013447</p>
            <p>IFSC: JAKAOANCHAR</p>
        </div>
    </div>

    <div id="prayers" class="page">
        <h3>Prayer Times</h3>
        <div id="prayerList">Loading...</div>
    </div>

    <div id="messages" class="page">
        <h3>Community Chat</h3>
        <div id="chatList"></div>
        <div style="display:flex; gap:5px;">
            <input type="text" id="chatInput" style="flex:1; padding:10px; border-radius:8px; border:1px solid #ddd;">
            <button id="sendMsg" class="btn" style="width:60px;">Send</button>
        </div>
    </div>

    <div id="me" class="page">
        <center>
            <img id="userPhoto" src="" style="width:80px; border-radius:50%;">
            <h2 id="userName">User</h2>
            <button class="btn" id="logoutBtn" style="background:#f44336;">Logout</button>
        </center>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="nav('home')"><i class="fas fa-home"></i>Home</div>
        <div class="nav-item" onclick="nav('prayers')"><i class="fas fa-clock"></i>Prayers</div>
        <div class="nav-item" onclick="nav('messages')"><i class="fas fa-comment"></i>Chat</div>
        <div class="nav-item" onclick="nav('me')"><i class="fas fa-user"></i>Me</div>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithRedirect, getRedirectResult, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, collection, addDoc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBerRmWoXYP1eiP_zqzRU_8LhvWDH4e_iY",
            authDomain: "masjid-al-hamzah-bbfb6.firebaseapp.com",
            projectId: "masjid-al-hamzah-bbfb6",
            storageBucket: "masjid-al-hamzah-bbfb6.firebasestorage.app",
            messagingSenderId: "1067466330734",
            appId: "1:1067466330734:web:271047b6377b2883e18c7f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let currentUser = null;

        // GLOBAL NAVIGATION FUNCTION
        window.nav = (id) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active-page');
            event.currentTarget.classList.add('active');
        };

        // AUTH LOGIC
        document.getElementById('loginBtn').onclick = () => signInWithRedirect(auth, provider);
        document.getElementById('logoutBtn').onclick = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            const overlay = document.getElementById('authOverlay');
            if (user) {
                overlay.style.display = 'none';
                currentUser = user;
                document.getElementById('userName').innerText = user.displayName;
                document.getElementById('userPhoto').src = user.photoURL;
            } else {
                overlay.style.display = 'flex';
            }
        });

        // PRAYER TIMES
        onSnapshot(doc(db, "settings", "prayer_times"), (snap) => {
            if (!snap.exists()) return;
            const t = snap.data();
            const list = ['fajr', 'zuhr', 'asr', 'maghrib', 'isha'];
            document.getElementById('prayerList').innerHTML = list.map(p => `
                <div class="card" style="display:flex; justify-content:space-between;">
                    <b style="text-transform:capitalize;">${p}</b> <span>${t[p]}</span>
                </div>
            `).join('');
        });

        // CHAT LOGIC
        document.getElementById('sendMsg').onclick = async () => {
            const val = document.getElementById('chatInput').value;
            if(!val) return;
            await addDoc(collection(db, "messages"), {
                text: val,
                name: currentUser.displayName,
                uid: currentUser.uid,
                ts: serverTimestamp()
            });
            document.getElementById('chatInput').value = '';
        };

        onSnapshot(query(collection(db, "messages"), orderBy("ts", "asc")), (snap) => {
            const box = document.getElementById('chatList');
            box.innerHTML = '';
            snap.forEach(d => {
                const m = d.data();
                const isMe = m.uid === currentUser?.uid;
                box.innerHTML += `<div class="msg ${isMe?'msg-me':'msg-them'}"><b>${m.name}</b><br>${m.text}</div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    </script>
</body>
</html>
