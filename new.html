<!DOCTYPE html>  <html lang="en">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">  
    <title>Masjid Al Hamzah - Community</title>  
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">  
    <style>  
        /* [KEEPING YOUR ORIGINAL STYLES HERE] */  
        :root {  
            --bg-body: #F5F3F0; --bg-surface: #FFFFFF; --text-primary: #1C2A2F;  
            --accent-emerald: #1F8A4C; --accent-gold: #D4A13E; --border-light: #EAE5DF;  
        }  
        body { font-family: 'Inter', sans-serif; background: var(--bg-body); color: var(--text-primary); margin: 0; padding-bottom: 80px; }  
        .app-container { max-width: 500px; margin: 0 auto; padding: 20px; }  
        .page { display: none; animation: fadeIn 0.3s; }  
        .active-page { display: block; }  
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }  /* New Components */  
    .card { background: white; padding: 15px; border-radius: 20px; margin-bottom: 15px; border: 1px solid var(--border-light); }  
    .input-group { display: flex; gap: 10px; margin-bottom: 20px; }  
    input { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid var(--border-light); }  
    .btn { background: var(--accent-emerald); color: white; border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; }  
      
    /* Chat UI */  
    #chatList, #debateList { height: 400px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding-bottom: 20px; }  
    .msg-bubble { background: var(--bg-body); padding: 10px 15px; border-radius: 15px; max-width: 80%; }  
    .msg-user { font-size: 0.7rem; color: var(--accent-gold); font-weight: bold; margin-bottom: 4px; }  
      
    /* Bottom Nav */  
    .bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: 500px; background: white; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid var(--border-light); }  
    .nav-item { text-align: center; font-size: 0.7rem; color: #888; cursor: pointer; }  
    .nav-item.active { color: var(--accent-emerald); }  
    .nav-item i { font-size: 1.2rem; display: block; }  
</style>

</head>  
<body>  <div class="app-container">  
    <div id="homePage" class="page active-page">  
        <h2>Prayer Times</h2>  
        <div id="prayerListContainer">Loading...</div>  
    </div>  <div id="communityPage" class="page">  
    <h2>Community Chat</h2>  
    <div id="chatList"></div>  
    <div class="input-group">  
        <input type="text" id="chatInput" placeholder="Type a message...">  
        <button class="btn" id="sendMsg"><i class="fas fa-paper-plane"></i></button>  
    </div>  
</div>  

<div id="debatePage" class="page">  
    <h2>Open Debates</h2>  
    <div class="input-group">  
        <input type="text" id="debateTopic" placeholder="Start a new debate topic...">  
        <button class="btn" id="startDebate">Post</button>  
    </div>  
    <div id="debateList"></div>  
</div>  

<div id="adminPage" class="page">  
    <h2>Admin Panel</h2>  
    <div id="adminAuth">  
        <input type="password" id="adminPin" placeholder="Enter Security PIN">  
        <button class="btn" id="loginAdmin">Access</button>  
    </div>  
    <div id="adminControls" style="display:none;">  
        <div class="card">  
            <h3>Update Timings</h3>  
            Fajr: <input type="text" id="editFajr"><br><br>  
            Zuhr: <input type="text" id="editZuhr"><br><br>  
            Asr: <input type="text" id="editAsr"><br><br>  
            Maghrib: <input type="text" id="editMaghrib"><br><br>  
            Isha: <input type="text" id="editIsha"><br><br>  
            <button class="btn" id="saveTimings">Save Changes</button>  
        </div>  
    </div>  
</div>  

<div id="profilePage" class="page">  
    <h2>Your Account</h2>  
    <div class="card">  
        <input type="text" id="userNameInput" placeholder="Enter your name">  
        <button class="btn" id="saveProfile">Save Profile</button>  
    </div>  
    <h3>Search Community Member</h3>  
    <input type="text" id="searchUser" placeholder="Search by name...">  
    <div id="userSearchResult"></div>  
</div>

</div>  <div class="bottom-nav">  
    <div class="nav-item active" data-page="homePage"><i class="fas fa-home"></i>Home</div>  
    <div class="nav-item" data-page="communityPage"><i class="fas fa-comments"></i>Chat</div>  
    <div class="nav-item" data-page="debatePage"><i class="fas fa-balance-scale"></i>Debates</div>  
    <div class="nav-item" data-page="adminPage"><i class="fas fa-user-shield"></i>Admin</div>  
    <div class="nav-item" data-page="profilePage"><i class="fas fa-user"></i>Profile</div>  
</div>  <script type="module">  
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";  
    import { getFirestore, doc, onSnapshot, updateDoc, collection, addDoc, query, orderBy, serverTimestamp, getDocs, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";  
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";  
  
    const firebaseConfig = {  
        apiKey: "AIzaSyBerRmWoXYP1eiP_zqzRU_8LhvWDH4e_iY",  
        authDomain: "masjid-al-hamzah-bbfb6.firebaseapp.com",  
        projectId: "masjid-al-hamzah-bbfb6",  
        storageBucket: "masjid-al-hamzah-bbfb6.firebasestorage.app",  
        messagingSenderId: "1067466330734",  
        appId: "1:1067466330734:web:271047b6377b2883e18c7f"  
    };  
  
    const app = initializeApp(firebaseConfig);  
    const db = getFirestore(app);  
    const auth = getAuth(app);  
    let currentUser = { name: "Guest", id: "" };  
  
    // --- AUTH & PROFILE ---  
    signInAnonymously(auth).then(cred => {  
        currentUser.id = cred.user.uid;  
        loadProfile();  
    });  
  
    async function loadProfile() {  
        const storedName = localStorage.getItem('masjidUserName');  
        if(storedName) currentUser.name = storedName;  
    }  
  
    document.getElementById('saveProfile').onclick = async () => {  
        const name = document.getElementById('userNameInput').value;  
        if(!name) return;  
        localStorage.setItem('masjidUserName', name);  
        currentUser.name = name;  
        await addDoc(collection(db, "users"), { uid: currentUser.id, name: name, prayers: 0 });  
        alert("Profile Saved!");  
    };  
  
    // --- LIVE PRAYER TIMES ---  
    onSnapshot(doc(db, "settings", "prayer_times"), (snap) => {  
        if (!snap.exists()) return;  
        const t = snap.data();  
        document.getElementById('prayerListContainer').innerHTML = `  
            <div class="card">Fajr: ${t.fajr}</div>  
            <div class="card">Zuhr: ${t.zuhr}</div>  
            <div class="card">Asr: ${t.asr}</div>  
            <div class="card">Maghrib: ${t.maghrib}</div>  
            <div class="card">Isha: ${t.isha}</div>  
        `;  
        // Pre-fill Admin fields  
        document.getElementById('editFajr').value = t.fajr;  
        document.getElementById('editZuhr').value = t.zuhr;  
        document.getElementById('editAsr').value = t.asr;  
        document.getElementById('editMaghrib').value = t.maghrib;  
        document.getElementById('editIsha').value = t.isha;  
    });  
  
    // --- COMMUNITY MESSAGING ---  
    document.getElementById('sendMsg').onclick = async () => {  
        const text = document.getElementById('chatInput').value;  
        if (!text) return;  
        await addDoc(collection(db, "messages"), {  
            user: currentUser.name,  
            text: text,  
            timestamp: serverTimestamp()  
        });  
        document.getElementById('chatInput').value = "";  
    };  
  
    onSnapshot(query(collection(db, "messages"), orderBy("timestamp", "asc")), (snap) => {  
        const list = document.getElementById('chatList');  
        list.innerHTML = "";  
        snap.forEach(doc => {  
            const m = doc.data();  
            list.innerHTML += `<div class="msg-bubble"><div class="msg-user">${m.user}</div>${m.text}</div>`;  
        });  
        list.scrollTop = list.scrollHeight;  
    });  
  
    // --- DEBATES ---  
    document.getElementById('startDebate').onclick = async () => {  
        const topic = document.getElementById('debateTopic').value;  
        if (!topic) return;  
        await addDoc(collection(db, "debates"), { topic, user: currentUser.name, votes: 0 });  
        document.getElementById('debateTopic').value = "";  
    };  
  
    onSnapshot(collection(db, "debates"), (snap) => {  
        const list = document.getElementById('debateList');  
        list.innerHTML = "";  
        snap.forEach(doc => {  
            const d = doc.data();  
            list.innerHTML += `  
                <div class="card">  
                    <strong>${d.topic}</strong><br><small>Started by ${d.user}</small>  
                    <div style="margin-top:10px;">  
                        <button class="btn" style="background:gray">Accept</button>  
                        <button class="btn" style="background:coral">Reject</button>  
                    </div>  
                </div>`;  
        });  
    });  
  
    // --- ADMIN ACCESS ---  
    document.getElementById('loginAdmin').onclick = () => {  
        const pin = document.getElementById('adminPin').value;  
        if (pin === "7860") { // SET YOUR PIN HERE  
            document.getElementById('adminAuth').style.display = "none";  
            document.getElementById('adminControls').style.display = "block";  
        } else {  
            alert("Wrong Pin!");  
        }  
    };  
  
    document.getElementById('saveTimings').onclick = async () => {  
        await updateDoc(doc(db, "settings", "prayer_times"), {  
            fajr: document.getElementById('editFajr').value,  
            zuhr: document.getElementById('editZuhr').value,  
            asr: document.getElementById('editAsr').value,  
            maghrib: document.getElementById('editMaghrib').value,  
            isha: document.getElementById('editIsha').value  
        });  
        alert("Timings Updated!");  
    };  
  
    // --- NAVIGATION LOGIC ---  
    document.querySelectorAll('.nav-item').forEach(item => {  
        item.onclick = () => {  
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));  
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));  
            document.getElementById(item.dataset.page).classList.add('active-page');  
            item.classList.add('active');  
        };  
    });  
</script>  </body>  
</html>
